# Render.com Deployment Configuration
# https://render.com/docs/yaml-spec

services:
  # Backend API (Go)
  - type: web
    name: bienestarapp-backend
    env: go
    region: oregon
    rootDir: backend
    buildCommand: go build -o app .
    startCommand: ./app
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true  # Render will generate a secure random value
      - key: USE_SQLITE
        value: "true"
      - key: DB_PATH
        value: ./data.db
    healthCheckPath: /health

# Nota: con SQLite en Render sin disco persistente, la base puede reiniciarse
# en redeploy/restart. Para persistencia real, usar disco persistente o Postgres.

# Frontend can be deployed separately to:
# - Render Static Site
# - Vercel (recommended for React)
# - Netlify
# See FRONTEND_DEPLOYMENT.md for details
