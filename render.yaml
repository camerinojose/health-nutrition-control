# Render.com Deployment Configuration
# https://render.com/docs/yaml-spec

services:
  # Backend API (Go)
  - type: web
    name: bienestarapp-backend
    env: go
    region: oregon
    buildCommand: cd backend && go build -o app .
    startCommand: cd backend && ./app
    plan: free
    autoDeploy: true
    envVars:
      - key: PORT
        value: 8080
      - key: GIN_MODE
        value: release
      - key: JWT_SECRET
        generateValue: true  # Render will generate a secure random value
      - key: DATABASE_URL
        fromDatabase:
          name: bienestarapp-db
          property: connectionString
    healthCheckPath: /api/health
    
  # PostgreSQL Database
  - type: pgsql
    name: bienestarapp-db
    region: oregon
    plan: free
    databaseName: bienestarapp
    databaseUser: bienestarapp_user
    ipAllowList: []  # Allow all IPs (for free tier)

# Frontend can be deployed separately to:
# - Render Static Site
# - Vercel (recommended for React)
# - Netlify
# See FRONTEND_DEPLOYMENT.md for details
